<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Friemi game room QR frame</title>
  <desc id="desc">A light rounded QR frame for offline game rooms.</desc>
  <defs>
    <linearGradient id="qrFrameBg" x1="28" y1="34" x2="332" y2="324" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEFFF9"/>
      <stop offset=".52" stop-color="#F1F2EC"/>
      <stop offset="1" stop-color="#FFF5E6"/>
    </linearGradient>
    <filter id="qrShadow" x="8" y="8" width="344" height="344" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#156240" flood-opacity=".14"/>
    </filter>
    <pattern id="qrDots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#8AB68E" opacity=".26"/>
    </pattern>
  </defs>
  <rect x="26" y="26" width="308" height="308" rx="42" fill="url(#qrFrameBg)" filter="url(#qrShadow)"/>
  <rect x="43" y="43" width="274" height="274" rx="30" fill="url(#qrDots)" opacity=".78"/>
