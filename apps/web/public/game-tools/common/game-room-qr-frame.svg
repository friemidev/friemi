  <circle cx="180" cy="180" r="42" fill="#EAF7EF" stroke="#8AB68E" stroke-width="2"/>
  <path d="M166 179c7 7 21 7 28 0" stroke="#156240" stroke-width="8" stroke-linecap="round"/>
  <circle cx="158" cy="168" r="8" fill="#F09182"/>
  <circle cx="202" cy="168" r="8" fill="#FFF5E6" stroke="#156240" stroke-width="2"/>
  <path d="M180 145v11m-18-5 7 8m29-8-7 8" stroke="#D6D5B2" stroke-width="6" stroke-linecap="round"/>
