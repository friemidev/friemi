<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Round table seat map</title>
  <desc id="desc">A neutral round table layout with ten seat markers.</desc>
