    </g>
    <g transform="translate(24 350)">
      <circle cx="11" cy="-3" r="10" fill="#DEAAB3" stroke="#DEAAB3"/>
      <path d="M11 -9 C15 -9 18 -6 18 -2 C18 4 11 10 11 10 C11 10 4 4 4 -2 C4 -6 7 -9 11 -9 Z" fill="none" stroke="#B5301F" stroke-width="1.5"/>
