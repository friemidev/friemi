      <circle cx="86" cy="58" r="54" fill="#FFF5E6" opacity="0.28"/>
      <path d="M30 160 C84 94 124 106 172 132 C230 164 262 98 318 68 L318 198 L30 198 Z" fill="#1D1D1B" opacity="0.34"/>
      <path d="M14 14 L316 198" stroke="#FFF5E6" stroke-width="3" opacity="0.28"/>
    </g>
    <rect x="28" y="28" width="78" height="28" rx="14" fill="#DEEBFF" stroke="#8AB68E"/>
    <circle cx="43" cy="42" r="4" fill="#8AB68E"/>
    <text class="tiny" x="54" y="46" fill="#1D1D1B">活动</text>
    <rect x="236" y="162" width="66" height="28" rx="14" fill="#F1F2E3"/>
    <text class="tiny" x="254" y="181" fill="#156240">进行中</text>
    <circle cx="282" cy="42" r="22" fill="#FEFFF9" stroke="#D6D5B2"/>
    <path d="M274 39 C274 33 282 32 286 37 C290 32 298 33 298 39 C298 49 286 55 286 55 C286 55 274 49 274 39 Z" fill="none" stroke="#1D1D1B" stroke-width="2.4" stroke-linejoin="round"/>
    <text class="cn-title" x="24" y="250" fill="#1D1D1B">周末艺术市集与夜间展览</text>
    <text class="cn-title" x="24" y="280" fill="#1D1D1B">沿河散步路线</text>
    <g transform="translate(24 314)">
      <rect x="0" y="-13" width="22" height="22" rx="7" fill="#F1F2E3" stroke="#D6D5B2"/>
      <path d="M6 -5 L16 -5 M8 -9 L8 -1 M14 -9 L14 -1 M6 1 L16 1" stroke="#156240" stroke-width="1.5" stroke-linecap="round"/>
      <text class="meta" x="32" y="3" fill="#156240">6月28日 17:00-19:00</text>
    </g>
    <g transform="translate(24 350)">
      <circle cx="11" cy="-3" r="10" fill="#F1F2E3" stroke="#D6D5B2"/>
      <path d="M11 -9 C15 -9 18 -6 18 -2 C18 4 11 10 11 10 C11 10 4 4 4 -2 C4 -6 7 -9 11 -9 Z" fill="none" stroke="#156240" stroke-width="1.5"/>
      <circle cx="11" cy="-2" r="2" fill="#156240"/>
      <text class="meta" x="32" y="3" fill="#156240">Paris · Le Marais</text>
    </g>
    <line x1="24" y1="386" x2="306" y2="386" stroke="#D6D5B2"/>
    <text class="small" x="24" y="426" fill="#8AB68E">整卡进入详情</text>
    <path d="M128 421 L144 421 M139 416 L144 421 L139 426" stroke="#8AB68E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="tiny" x="24" y="478" fill="#156240">轻发现 · 少按钮 · 信息清楚</text>
  </g>

  <g transform="translate(508 286)" filter="url(#coralShadow)">
    <rect x="0" y="0" width="330" height="522" rx="24" fill="#FFF5E6" stroke="#DEAAB3"/>
    <rect x="0" y="0" width="330" height="6" rx="3" fill="#F09182"/>
    <clipPath id="teamMediaClip">
      <rect x="14" y="14" width="302" height="184" rx="20"/>
    </clipPath>
    <g clip-path="url(#teamMediaClip)">
      <rect x="14" y="14" width="302" height="184" fill="url(#mediaTeam)"/>
      <circle cx="262" cy="48" r="62" fill="#FFF5E6" opacity="0.23"/>
      <path d="M14 158 C58 116 98 115 138 136 C184 160 224 142 268 100 C290 80 306 70 316 66 L316 198 L14 198 Z" fill="#156240" opacity="0.38"/>
      <circle cx="80" cy="76" r="34" fill="#F09182" opacity="0.36"/>
    </g>
    <rect x="28" y="28" width="82" height="28" rx="14" fill="#DEAAB3" stroke="#DEAAB3"/>
    <circle cx="43" cy="42" r="4" fill="#369758"/>
    <text class="tiny" x="54" y="46" fill="#1D1D1B">组局</text>
    <rect x="218" y="162" width="84" height="28" rx="14" fill="#F1F2E3"/>
    <text class="tiny" x="239" y="181" fill="#156240">开放局</text>
    <circle cx="282" cy="42" r="22" fill="#FEFFF9" stroke="#DEAAB3"/>
    <path d="M274 39 C274 33 282 32 286 37 C290 32 298 33 298 39 C298 49 286 55 286 55 C286 55 274 49 274 39 Z" fill="none" stroke="#1D1D1B" stroke-width="2.4" stroke-linejoin="round"/>
    <text class="cn-title" x="24" y="250" fill="#1D1D1B">一起去看河岸夏日晚场</text>
    <text class="cn-title" x="24" y="280" fill="#1D1D1B">结束后附近小聚</text>
    <g transform="translate(24 314)">
      <rect x="0" y="-13" width="22" height="22" rx="7" fill="#DEAAB3" stroke="#DEAAB3"/>
      <path d="M6 -5 L16 -5 M8 -9 L8 -1 M14 -9 L14 -1 M6 1 L16 1" stroke="#B5301F" stroke-width="1.5" stroke-linecap="round"/>
