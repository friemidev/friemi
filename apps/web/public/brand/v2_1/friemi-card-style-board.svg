    <rect x="14" y="270" width="162" height="36" rx="18" fill="#DEAAB3" stroke="#DEAAB3"/>
    <circle cx="36" cy="288" r="12" fill="#F09182"/>
    <path d="M36 282 L36 294 M30 288 L42 288" stroke="#FFF5E6" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="66" cy="288" r="12" fill="#FFF5E6" stroke="#DEAAB3"/>
    <path d="M61 284 L70 284 L70 293 L61 293 Z M58 281 L67 281 L67 290" fill="none" stroke="#1D1D1B" stroke-width="1.4"/>
    <text class="small" x="91" y="293" fill="#1D1D1B">操作</text>
  </g>

  <g transform="translate(920 706)">
    <rect x="0" y="0" width="418" height="148" rx="28" fill="#FEFFF9" stroke="#D6D5B2"/>
    <text class="label" x="28" y="38" fill="#156240">mobile action sheet</text>
    <text class="body" x="28" y="72" fill="#1D1D1B">点击组局卡片里的一个动作入口后，再展示完整文案。</text>
    <rect x="28" y="96" width="170" height="34" rx="17" fill="#F09182"/>
    <circle cx="48" cy="113" r="9" fill="#FFF5E6"/>
    <path d="M48 108 L48 118 M43 113 L53 113" stroke="#F09182" stroke-width="1.6" stroke-linecap="round"/>
    <text class="small" x="66" y="118" fill="#FFF5E6">报名加入</text>
    <rect x="214" y="96" width="170" height="34" rx="17" fill="#FEFFF9" stroke="#8AB68E"/>
    <path d="M239 108 L249 108 L249 118 L239 118 Z M234 103 L244 103 L244 113" fill="none" stroke="#156240" stroke-width="1.6"/>
    <text class="small" x="264" y="118" fill="#156240">再来一局</text>
  </g>

  <g transform="translate(134 868)">
    <text class="label" x="0" y="0" fill="#156240">rules</text>
    <text class="body" x="0" y="38" fill="#156240">活动卡片少操作，负责“发现”。组局卡片强调人和行动，负责“加入”。</text>
    <text class="body" x="0" y="72" fill="#156240">移动端双列优先：标题 2 行、地点 1 行、按钮短文案；英文/法语长文案进弹层。</text>
    <text class="body" x="0" y="106" fill="#156240">桌面端保持密度：1280px 4 列更稳，5 列只给超宽屏。</text>
  </g>
</svg>
