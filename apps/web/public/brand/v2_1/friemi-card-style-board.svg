<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Friemi v2.1 activity and team card style board</title>
  <desc id="desc">A visual style board for Friemi activity cards and team cards using the v2.1 forest, cream, ink and coral brand palette.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F1F2E3"/>
      <stop offset="48%" stop-color="#FFF5E6"/>
      <stop offset="100%" stop-color="#DEEBFF"/>
    </linearGradient>
    <linearGradient id="mediaEvent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8AB68E"/>
      <stop offset="48%" stop-color="#D6D5B2"/>
      <stop offset="100%" stop-color="#369758"/>
    </linearGradient>
    <linearGradient id="mediaTeam" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1D1D1B"/>
      <stop offset="48%" stop-color="#F09182"/>
      <stop offset="100%" stop-color="#369758"/>
    </linearGradient>
    <linearGradient id="mobileFrame" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FEFFF9"/>
      <stop offset="55%" stop-color="#FFF5E6"/>
      <stop offset="100%" stop-color="#DEAAB3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#156240" flood-opacity="0.13"/>
    </filter>
    <filter id="coralShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#F09182" flood-opacity="0.20"/>
    </filter>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#156240" opacity="0.18"/>
    </pattern>
    <style>
      text { font-family: "Noto Sans SC", "Segoe UI", system-ui, sans-serif; }
      .label { font-size: 13px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
      .board-title { font-size: 38px; font-weight: 750; letter-spacing: 0; }
      .section { font-size: 24px; font-weight: 750; letter-spacing: 0; }
      .h3 { font-size: 22px; font-weight: 760; letter-spacing: 0; }
      .body { font-size: 16px; font-weight: 500; letter-spacing: 0; }
      .small { font-size: 13px; font-weight: 650; letter-spacing: 0; }
      .tiny { font-size: 11px; font-weight: 700; letter-spacing: 0; }
      .cn-title { font-size: 20px; font-weight: 800; letter-spacing: 0; }
      .cn-mobile { font-size: 14px; font-weight: 800; letter-spacing: 0; }
      .meta { font-size: 14px; font-weight: 600; letter-spacing: 0; }
      .mobile-meta { font-size: 11px; font-weight: 600; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="url(#pageBg)"/>
  <rect x="0" y="0" width="1600" height="1050" fill="url(#dotGrid)" opacity="0.6"/>
  <circle cx="1450" cy="120" r="230" fill="#F09182" opacity="0.10"/>
  <circle cx="90" cy="920" r="280" fill="#369758" opacity="0.10"/>

  <g transform="translate(80 64)">
    <rect x="0" y="0" width="64" height="64" rx="18" fill="#369758"/>
    <circle cx="24" cy="34" r="9" fill="#F09182"/>
    <circle cx="43" cy="26" r="9" fill="#FFF5E6"/>
    <path d="M24 42 C32 54 47 48 47 35" fill="none" stroke="#FFF5E6" stroke-width="8" stroke-linecap="round"/>
    <text class="label" x="84" y="22" fill="#156240">Friemi v2.1 card materials</text>
    <text class="board-title" x="84" y="64" fill="#1D1D1B">活动卡片轻一点，组局卡片更有人的温度。</text>
  </g>

  <g transform="translate(84 158)">
    <rect x="0" y="0" width="1432" height="800" rx="42" fill="#FEFFF9" opacity="0.78" stroke="#D6D5B2"/>
    <path d="M40 96 C220 20 350 44 470 100 C610 165 730 124 880 56 C1030 -12 1220 4 1392 80 L1392 0 L40 0 Z" fill="#F1F2E3" opacity="0.55"/>
  </g>

  <g transform="translate(134 204)">
    <text class="label" x="0" y="0" fill="#156240">desktop cards</text>
    <text class="body" x="0" y="34" fill="#156240">1280px 优先 4 列，超宽屏再进 5 列。卡片要有品牌感，但内容仍然是主角。</text>
  </g>

