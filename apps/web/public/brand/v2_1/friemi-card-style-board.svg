      <text class="meta" x="32" y="3" fill="#156240">Paris · Canal Saint-Martin</text>
    </g>
    <g transform="translate(24 390)">
      <circle cx="12" cy="0" r="12" fill="#F09182"/>
      <text class="tiny" x="8" y="4" fill="#FFF5E6">L</text>
      <circle cx="31" cy="0" r="12" fill="#369758" stroke="#FFF5E6" stroke-width="2"/>
      <text class="tiny" x="26" y="4" fill="#FFF5E6">J</text>
      <circle cx="50" cy="0" r="12" fill="#1D1D1B" stroke="#FFF5E6" stroke-width="2"/>
      <text class="tiny" x="45" y="4" fill="#FFF5E6">M</text>
      <rect x="78" y="-14" width="92" height="28" rx="14" fill="#FEFFF9" stroke="#8AB68E"/>
      <text class="small" x="93" y="5" fill="#156240">3/6 已报名</text>
    </g>
    <g transform="translate(24 438)">
      <rect x="0" y="0" width="282" height="48" rx="24" fill="#FFF5E6" stroke="#DEAAB3"/>
      <rect x="4" y="4" width="137" height="40" rx="20" fill="#F09182"/>
      <circle cx="31" cy="24" r="12" fill="#FFF5E6" opacity="0.95"/>
      <path d="M31 18 L31 30 M25 24 L37 24" stroke="#F09182" stroke-width="2.2" stroke-linecap="round"/>
      <text class="small" x="55" y="29" fill="#FFF5E6">报名加入</text>
      <circle cx="232" cy="24" r="17" fill="#FFF5E6" stroke="#D6D5B2"/>
      <path d="M226 20 L237 20 L237 31 L226 31 Z M222 16 L233 16 L233 27" fill="none" stroke="#1D1D1B" stroke-width="1.8" stroke-linejoin="round"/>
    </g>
    <text class="tiny" x="24" y="504" fill="#156240">有人气 · 有动作 · 但移动端不塞长按钮</text>
  </g>

  <g transform="translate(920 204)">
    <text class="label" x="0" y="0" fill="#156240">mobile two-column</text>
    <text class="body" x="0" y="34" fill="#156240">390px 下保持双列，长文案进弹层，不让卡片被按钮撑高。</text>
  </g>

  <g transform="translate(920 286)">
    <rect x="-30" y="-34" width="514" height="482" rx="38" fill="url(#mobileFrame)" stroke="#D6D5B2"/>
    <rect x="-8" y="-12" width="220" height="396" rx="28" fill="#1D1D1B" opacity="0.08"/>
    <rect x="0" y="0" width="190" height="330" rx="20" fill="#FEFFF9" stroke="#8AB68E" filter="url(#softShadow)"/>
    <rect x="9" y="9" width="172" height="105" rx="16" fill="url(#mediaEvent)"/>
    <rect x="19" y="19" width="58" height="22" rx="11" fill="#DEEBFF" stroke="#8AB68E"/>
    <circle cx="31" cy="30" r="3" fill="#8AB68E"/>
    <text class="tiny" x="40" y="34" fill="#1D1D1B">展览</text>
    <circle cx="160" cy="30" r="17" fill="#FEFFF9" stroke="#D6D5B2"/>
    <path d="M153 28 C153 24 158 23 160 26 C163 23 168 24 168 28 C168 35 160 39 160 39 C160 39 153 35 153 28 Z" fill="none" stroke="#1D1D1B" stroke-width="1.8"/>
    <rect x="116" y="91" width="56" height="20" rx="10" fill="#F1F2E3"/>
    <text class="tiny" x="128" y="106" fill="#156240">进行中</text>
    <text class="cn-mobile" x="14" y="146" fill="#1D1D1B">市集夜场与沿河</text>
    <text class="cn-mobile" x="14" y="168" fill="#1D1D1B">散步路线</text>
    <text class="mobile-meta" x="34" y="200" fill="#156240">6月28日 17:00-19:00</text>
    <path d="M17 188 L29 188 M19 184 L19 192 M27 184 L27 192 M17 196 L29 196" stroke="#8AB68E" stroke-width="1.4" stroke-linecap="round"/>
    <text class="mobile-meta" x="34" y="226" fill="#156240">Paris</text>
    <path d="M23 211 C28 211 31 215 31 219 C31 226 23 232 23 232 C23 232 15 226 15 219 C15 215 18 211 23 211 Z" fill="none" stroke="#8AB68E" stroke-width="1.4"/>
    <rect x="14" y="272" width="106" height="34" rx="17" fill="#F1F2E3" stroke="#D6D5B2"/>
    <text class="small" x="35" y="294" fill="#156240">查看</text>
    <path d="M83 288 L97 288 M92 283 L97 288 L92 293" stroke="#156240" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <g transform="translate(1140 286)">
    <rect x="0" y="0" width="190" height="330" rx="20" fill="#FFF5E6" stroke="#DEAAB3" filter="url(#coralShadow)"/>
    <rect x="9" y="9" width="172" height="105" rx="16" fill="url(#mediaTeam)"/>
    <rect x="19" y="19" width="56" height="22" rx="11" fill="#DEAAB3" stroke="#DEAAB3"/>
    <circle cx="31" cy="30" r="3" fill="#369758"/>
    <text class="tiny" x="40" y="34" fill="#1D1D1B">组局</text>
    <circle cx="160" cy="30" r="17" fill="#FEFFF9" stroke="#DEAAB3"/>
    <path d="M153 28 C153 24 158 23 160 26 C163 23 168 24 168 28 C168 35 160 39 160 39 C160 39 153 35 153 28 Z" fill="none" stroke="#1D1D1B" stroke-width="1.8"/>
    <rect x="114" y="91" width="58" height="20" rx="10" fill="#F1F2E3"/>
    <text class="tiny" x="126" y="106" fill="#156240">开放局</text>
    <text class="cn-mobile" x="14" y="146" fill="#1D1D1B">看展后附近</text>
    <text class="cn-mobile" x="14" y="168" fill="#1D1D1B">一起小聚</text>
    <text class="mobile-meta" x="34" y="200" fill="#156240">6月28日 17:00</text>
    <path d="M17 188 L29 188 M19 184 L19 192 M27 184 L27 192 M17 196 L29 196" stroke="#F09182" stroke-width="1.4" stroke-linecap="round"/>
    <g transform="translate(14 225)">
      <circle cx="10" cy="0" r="10" fill="#F09182"/>
      <text class="tiny" x="7" y="4" fill="#FFF5E6">L</text>
      <circle cx="26" cy="0" r="10" fill="#369758" stroke="#FFF5E6" stroke-width="2"/>
      <text class="tiny" x="23" y="4" fill="#FFF5E6">J</text>
      <circle cx="42" cy="0" r="10" fill="#1D1D1B" stroke="#FFF5E6" stroke-width="2"/>
      <text class="tiny" x="39" y="4" fill="#FFF5E6">M</text>
      <text class="mobile-meta" x="62" y="4" fill="#156240">3/6</text>
